name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: ERD validation (StatsBomb API)
        run: python scripts/validate_erd.py

      - name: Unit tests
        run: pytest
